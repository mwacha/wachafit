services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-wachafit}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-wachafit}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      APP_UPLOAD_DIR: /data/uploads
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-manual}
      PAYMENT_ACCESS_TOKEN: ${PAYMENT_ACCESS_TOKEN:-}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
      PAYMENT_SUSPEND_AFTER_DAYS: ${PAYMENT_SUSPEND_AFTER_DAYS:-5}
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
