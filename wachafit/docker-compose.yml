services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wachafit
      POSTGRES_USER: wachafit
      POSTGRES_PASSWORD: wachafit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wachafit"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
