<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 40px auto; background: #fff;
                 border-radius: 12px; overflow: hidden;
                 box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .header { background: #3b82f6; padding: 28px 32px; color: #fff; }
    .header h1 { margin: 0; font-size: 20px; font-weight: 700; }
    .body { padding: 28px 32px; color: #374151; font-size: 15px; line-height: 1.6; }
    .plan-box { background: #eff6ff; border-left: 4px solid #3b82f6;
                border-radius: 4px; padding: 14px 18px; margin: 20px 0; }
    .plan-name { font-size: 17px; font-weight: 700; color: #1d4ed8; }
    .footer { padding: 16px 32px; font-size: 12px; color: #9ca3af;
              border-top: 1px solid #f1f5f9; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>Nova ficha de treino 💪</h1></div>
  <div class="body">
    <p>Olá, <strong th:text="${studentName}">Aluno</strong>!</p>
    <p>Seu personal <strong th:text="${trainerName}">Trainer</strong> acabou de atribuir uma nova ficha de treino para você:</p>
    <div class="plan-box">
      <div class="plan-name" th:text="${planName}">Plano A</div>
    </div>
    <p>Acesse o WachaFit para ver os exercícios, séries e cargas sugeridas.</p>
    <p>Bons treinos! 🏋️</p>
  </div>
  <div class="footer">WachaFit — não responda a este e-mail.</div>
</div>
</body>
</html>
