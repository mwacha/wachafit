<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Nova Solicitação de Sessão</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px;">
  <div style="max-width:600px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;">
    <div style="background:#1a73e8;padding:24px;text-align:center;">
      <h1 style="color:#fff;margin:0;">WachaFit</h1>
    </div>
    <div style="padding:32px;">
      <h2>Nova solicitação de sessão individual</h2>
      <p>Olá, <strong th:text="${trainerName}">Profissional</strong>!</p>
      <p>Um aluno solicitou uma sessão pessoal com você:</p>
      <table style="width:100%;border-collapse:collapse;margin:16px 0;">
        <tr><td style="padding:8px;border-bottom:1px solid #eee;color:#666;">Aluno</td>
            <td style="padding:8px;border-bottom:1px solid #eee;" th:text="${studentName}">Aluno</td></tr>
        <tr><td style="padding:8px;border-bottom:1px solid #eee;color:#666;">Data</td>
            <td style="padding:8px;border-bottom:1px solid #eee;" th:text="${date}">2026-07-01</td></tr>
        <tr><td style="padding:8px;color:#666;">Horário</td>
            <td style="padding:8px;" th:text="${time}">08:00</td></tr>
      </table>
      <p>Acesse o sistema para confirmar ou recusar a solicitação.</p>
    </div>
    <div style="background:#f4f4f4;padding:16px;text-align:center;color:#666;font-size:12px;">
      <p>© 2026 WachaFit</p>
    </div>
  </div>
</body>
</html>
