spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true

app:
  frontend-url: ${APP_FRONTEND_URL}
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  payment:
    gateway: ${PAYMENT_GATEWAY:manual}
    access-token: ${PAYMENT_ACCESS_TOKEN:}
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET:}
    suspend-after-days: ${PAYMENT_SUSPEND_AFTER_DAYS:5}
